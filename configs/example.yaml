# Example experiment configuration for Zn (modular addition)
# Usage: uv run python -m train.launch --config configs/example.yaml

dataset:
  task: "zn"  # "zn" for modular addition, "s5" for permutation composition
  # Zn-specific settings
  modulus: 10           # n in Z_n (group size)
  # Common settings
  max_k: 5              # Max sequence length (composition depth)
  samples_per_k: 100_000
  max_seq_len: 12
  test_size: 0.2

model:
  type: "GroupDeltaNet"  # or "GroupTransformer"
  num_layers: 1
  nhead: 1
  d_model: 128
  dropout: 0.1
  use_compile: true
  allow_neg_eigval: false  # Set true to multiply beta by 2 for NC¹ expressivity

training:
  batch_size: 2048
  lr: 1e-3
  beta1: 0.9
  beta2: 0.999
  op_eps: 1e-8
  weight_decay: 0.01
  gradient_clip: 1.0
  max_val_acc: 0.99
  max_epochs_per_stage: 100

logging:
  wandb_project: "nc1-tc0-transformer-toy-experiments"
  hf_repo_id: "bkitano/zn-transformer"

deployment:
  n_gpus: 1
  gpu_type: "A100"
  timeout_seconds: 28800
