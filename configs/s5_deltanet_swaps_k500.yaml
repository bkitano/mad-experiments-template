# S5 DeltaNet swaps-only with k=500 (Grazzi et al. long sequence test)
# Usage: uv run modal run --detach -m train.modal_config --config configs/s5_deltanet_swaps_k500.yaml

dataset:
  task: "s5"
  max_k: 500
  fixed_k: 500               # Non-curriculum: train only at k=500
  curriculum: false          # Disable curriculum, train at fixed_k directly
  samples_per_k: 3200        # 1.6M total / 500 = 3200 per k (but only k=500 used)
  max_seq_len: 505           # k + BOS + EOS + padding
  test_size: 0.025           # 40K test / 1.6M = 2.5%
  generator_subset: "swaps"

model:
  type: "GroupDeltaNet"
  num_layers: 1
  nhead: 4
  d_model: 128
  dropout: 0.0
  use_compile: true
  allow_neg_eigval: true
  use_short_conv: false

training:
  batch_size: 512
  lr: 1e-4
  beta1: 0.9
  beta2: 0.999
  op_eps: 1e-8
  weight_decay: 0.01
  gradient_clip: 1.0
  max_val_acc: 0.99
  max_epochs_per_stage: 100

logging:
  wandb_project: "nc1-tc0-transformer-toy-experiments"
  hf_repo_id: "bkitano/s5-deltanet"

deployment:
  n_gpus: 1
  gpu_type: "A100"
  timeout_seconds: 86400     # 24 hours for long sequences
