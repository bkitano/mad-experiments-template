# S5 DeltaNet with swaps-only generator subset (Grazzi et al. "S5 only swaps")
# Input tokens sampled from 11 elements (identity + 10 transpositions)
# Output can be any of 120 elements
# Usage: uv run modal run --detach -m train.modal_config --config configs/s5_deltanet_swaps.yaml

dataset:
  task: "s5"
  max_k: 5
  samples_per_k: 200_000
  max_seq_len: 12
  test_size: 0.2
  generator_subset: "swaps"  # Only sample from transpositions + identity (11 elements)

model:
  type: "GroupDeltaNet"
  num_layers: 1
  nhead: 4
  d_model: 128
  dropout: 0.0
  use_compile: true
  allow_neg_eigval: true
  use_short_conv: false

training:
  batch_size: 512
  lr: 1e-4
  beta1: 0.9
  beta2: 0.999
  op_eps: 1e-8
  weight_decay: 0.01
  gradient_clip: 1.0
  max_val_acc: 0.99
  max_epochs_per_stage: 200

logging:
  wandb_project: "nc1-tc0-transformer-toy-experiments"
  hf_repo_id: "bkitano/s5-deltanet"

deployment:
  n_gpus: 1
  gpu_type: "A100"
  timeout_seconds: 28800
